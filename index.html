<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>RUSLAN BRONZA</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold: #c8a84e;
    --gold-bright: #e4c76b;
    --bg: #080805;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--bg);
    font-family: 'Press Start 2P', monospace;
    user-select: none;
    -webkit-user-select: none;
    touch-action: pan-x pinch-zoom;
  }

  canvas#nebula { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 0; }

  .vignette {
    position: fixed; inset: 0; pointer-events: none; z-index: 1;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(8, 8, 5, 0.5) 85%, rgba(8, 8, 5, 0.75) 100%);
  }

  .scanlines {
    position: fixed; inset: 0; pointer-events: none; z-index: 100;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0, 0, 0, 0.015) 2px,
      rgba(0, 0, 0, 0.015) 4px
    );
    opacity: 0.5;
  }

  .cursor-glow {
    position: fixed; top: 0; left: 0;
    width: 160px; height: 160px;
    pointer-events: none; z-index: 1;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(200, 168, 78, 0.04) 0%, rgba(200, 168, 78, 0.015) 40%, transparent 70%);
    transform: translate(-50%, -50%);
    will-change: left, top;
  }

  .container {
    position: relative; z-index: 2;
    height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: space-between;
    padding: 2.5rem 2rem 1.5rem;
  }

  @media (max-width: 768px) {
    .container { padding: 1.8rem 1.2rem 1.2rem; }
  }

  .header { flex-shrink: 0; text-align: center; }

  .title-wrap { position: relative; display: inline-block; }

  .title {
    font-size: clamp(1rem, 3vw, 1.8rem);
    color: var(--gold);
    text-shadow:
      0 0 6px rgba(200, 168, 78, 0.4),
      0 0 18px rgba(200, 168, 78, 0.2),
      0 0 40px rgba(200, 168, 78, 0.12),
      0 0 80px rgba(200, 168, 78, 0.06);
    letter-spacing: 0.5em;
    animation: titleBreathe 4s ease-in-out infinite;
  }

  @keyframes titleBreathe {
    0%, 100% {
      text-shadow:
        0 0 6px rgba(200, 168, 78, 0.4),
        0 0 18px rgba(200, 168, 78, 0.2),
        0 0 40px rgba(200, 168, 78, 0.12),
        0 0 80px rgba(200, 168, 78, 0.06);
    }
    50% {
      text-shadow:
        0 0 10px rgba(200, 168, 78, 0.55),
        0 0 28px rgba(200, 168, 78, 0.3),
        0 0 60px rgba(200, 168, 78, 0.2),
        0 0 100px rgba(200, 168, 78, 0.12);
    }
  }

  .title-bar {
    position: absolute;
    bottom: -8px;
    left: 50%;
    transform: translateX(-50%);
    width: 60%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity: 0.5;
    animation: barPulse 4s ease-in-out infinite;
  }

  @keyframes barPulse {
    0%, 100% { opacity: 0.35; width: 55%; }
    50% { opacity: 0.7; width: 70%; }
  }

  .stage {
    flex: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    position: relative; width: 100%; max-width: 400px;
    perspective: 800px;
  }

  .card {
    position: absolute;
    display: flex; flex-direction: column; align-items: center;
    width: 100%;
    opacity: 0; transform: scale(0.92);
    transition: opacity 0.7s cubic-bezier(0.16, 1, 0.3, 1),
                transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);
    pointer-events: none;
    will-change: transform, opacity;
  }

  .card.visible {
    position: relative;
    opacity: 1; transform: translateY(0) scale(1);
    pointer-events: auto;
  }

  .card.leaving-left  { opacity: 0; transform: translateX(-70px) scale(0.88); }
  .card.leaving-right { opacity: 0; transform: translateX(70px) scale(0.88); }
  .card.entering-left  { opacity: 0; transform: translateX(-70px) scale(0.88); }
  .card.entering-right { opacity: 0; transform: translateX(70px) scale(0.88); }

  .frame-wrap {
    position: relative;
    width: 100%; max-width: 320px; aspect-ratio: 3 / 4;
    transition: filter 0.7s;
    transform-style: preserve-3d;
  }

  @media (max-width: 768px) {
    .frame-wrap { max-width: 250px; }
  }

  .frame {
    position: absolute; inset: -10px;
    border: 2px solid rgba(200, 168, 78, 0.5);
    box-shadow:
      0 0 20px rgba(200, 168, 78, 0.12),
      0 0 50px rgba(200, 168, 78, 0.05);
    pointer-events: none;
    transition: all 0.7s;
  }

  .card.visible .frame {
    border-color: rgba(200, 168, 78, 0.6);
    box-shadow:
      0 0 30px rgba(200, 168, 78, 0.18),
      0 0 70px rgba(200, 168, 78, 0.07),
      0 0 120px rgba(200, 168, 78, 0.03);
    animation: framePulse 3s ease-in-out infinite;
  }

  @keyframes framePulse {
    0%, 100% {
      box-shadow:
        0 0 30px rgba(200, 168, 78, 0.18),
        0 0 70px rgba(200, 168, 78, 0.07),
        0 0 120px rgba(200, 168, 78, 0.03);
    }
    50% {
      box-shadow:
        0 0 42px rgba(200, 168, 78, 0.25),
        0 0 90px rgba(200, 168, 78, 0.1),
        0 0 150px rgba(200, 168, 78, 0.05),
        0 0 200px rgba(200, 168, 78, 0.02);
    }
  }

  .frame-wrap img {
    position: relative; z-index: 1;
    width: 100%; height: 100%; object-fit: cover; display: block;
    filter: saturate(0.85) contrast(0.9) brightness(0.88);
    transition: filter 0.7s;
  }

  .card.visible .frame-wrap img {
    filter: saturate(1.05) contrast(1.05) brightness(1);
  }

  .inscription {
    margin-top: 1.8rem; text-align: center;
    transition: opacity 0.7s, transform 0.7s;
  }

  .inscription .line {
    font-size: 0.38rem; color: var(--gold);
    text-shadow:
      0 0 6px rgba(200, 168, 78, 0.35),
      0 0 16px rgba(200, 168, 78, 0.12);
    letter-spacing: 0.2em; line-height: 2;
    transition: all 0.5s;
  }

  .card.visible .inscription .line {
    text-shadow:
      0 0 10px rgba(200, 168, 78, 0.45),
      0 0 24px rgba(200, 168, 78, 0.2),
      0 0 40px rgba(200, 168, 78, 0.06);
    animation: textGlow 3s ease-in-out infinite;
  }

  @keyframes textGlow {
    0%, 100% {
      text-shadow:
        0 0 10px rgba(200, 168, 78, 0.45),
        0 0 24px rgba(200, 168, 78, 0.2),
        0 0 40px rgba(200, 168, 78, 0.06);
    }
    50% {
      text-shadow:
        0 0 14px rgba(200, 168, 78, 0.6),
        0 0 32px rgba(228, 199, 107, 0.35),
        0 0 50px rgba(228, 199, 107, 0.12);
    }
  }

  .footer {
    flex-shrink: 0; display: flex; align-items: center; gap: 1.5rem;
  }

  .counter {
    font-size: 0.26rem; color: rgba(200, 168, 78, 0.4);
    letter-spacing: 0.2em;
    transition: all 0.3s;
    min-width: 5em; text-align: center;
  }

  .counter.pulse {
    color: rgba(228, 199, 107, 0.8);
    text-shadow: 0 0 12px rgba(200, 168, 78, 0.5);
  }

  .arrows { display: flex; gap: 1.2rem; }

  .arrow {
    background: none; border: none;
    color: rgba(200, 168, 78, 0.5);
    font-family: 'Press Start 2P', monospace;
    font-size: 0.8rem; cursor: pointer;
    padding: 0.4rem 0.8rem;
    transition: all 0.3s;
    text-shadow: 0 0 6px rgba(200, 168, 78, 0.2);
    position: relative;
  }

  .arrow::before {
    content: '';
    position: absolute;
    inset: -4px -8px;
    border-radius: 4px;
    background: radial-gradient(ellipse at center, rgba(200, 168, 78, 0.08), transparent 70%);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .arrow:hover {
    color: var(--gold-bright);
    text-shadow:
      0 0 14px rgba(200, 168, 78, 0.5),
      0 0 30px rgba(200, 168, 78, 0.15);
    transform: scale(1.08);
  }

  .arrow:hover::before { opacity: 1; }
  .arrow:active { transform: scale(0.9); }

  @media (max-width: 768px) {
    .footer { gap: 1rem; }
  }
</style>
</head>
<body>
<canvas id="nebula"></canvas>
<div class="vignette"></div>
<div class="cursor-glow" id="cursorGlow"></div>
<div class="scanlines"></div>

<div class="container">
  <header class="header">
    <div class="title-wrap">
      <h1 class="title">RUSLAN BRONZA</h1>
      <div class="title-bar"></div>
    </div>
  </header>

  <div class="stage" id="stage"></div>

  <div class="footer">
    <button class="arrow" id="prevBtn" aria-label="Previous">&lt;</button>
    <span class="counter" id="counter"></span>
    <button class="arrow" id="nextBtn" aria-label="Next">&gt;</button>
  </div>
</div>

<script>
const inscriptions = [
  'THE FIRST TO SEE THE PATTERN',
  'BROKE THE IMPOSSIBLE IN HALF',
  'TAUGHT MACHINES TO UNDERSTAND',
  'FOUND SIGNAL IN THE NOISE',
  'WROTE THE LANGUAGE OF GODS',
  'TURNED CHAOS INTO STRUCTURE',
  'CHOSE FREEDOM OVER CONVENIENCE',
  'WOVE A WEB ACROSS THE VOID',
  'DEFINED WHAT IT MEANS TO COMPUTE',
  'PAINTED WORLDS WITH TRIANGLES',
  'GAVE THE WEB A VOICE',
  'CRAFTED TOOLS THAT CRAFT TOOLS',
  'LANDED ON THE MOON WITH 4KB',
  'TAUGHT MACHINES TO SPEAK FIRST',
  'WHISPERED ELEGANCE INTO SILICON',
  'BUILDER OF DREAMS, DREAMER OF BUILDS',
];

const pictures = [
  'photo_2026-07-20 23.03.56',
  'photo_2026-07-20 23.03.57',
  'photo_2026-07-20 23.03.58',
  'photo_2026-07-20 23.03.59',
  'photo_2026-07-20 23.04.00',
  'photo_2026-07-20 23.04.01',
  'photo_2026-07-20 23.04.02',
  'photo_2026-07-20 23.04.03',
  'photo_2026-07-20 23.04.04',
  'photo_2026-07-20 23.04.06',
  'photo_2026-07-20 23.04.07',
  'photo_2026-07-20 23.04.09',
  'photo_2026-07-20 23.04.10',
  'photo_2026-07-20 23.04.11',
  'photo_2026-07-20 23.04.12',
  'photo_2026-07-20 23.04.13',
];

const stage = document.getElementById('stage');
const counterEl = document.getElementById('counter');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const canvas = document.getElementById('nebula');
const ctx = canvas.getContext('2d');
const cursorGlow = document.getElementById('cursorGlow');

let currentIdx = 0;
const cards = [];
let transitioning = false;
const isTouch = 'ontouchstart' in window;

function createCard(i) {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="frame-wrap">
      <div class="frame"></div>
      <img src="pictures/${pictures[i]}.jpeg" alt="" loading="lazy">
    </div>
    <div class="inscription"><div class="line">${inscriptions[i]}</div></div>
  `;
  stage.appendChild(card);
  cards.push(card);
}

for (let i = 0; i < pictures.length; i++) createCard(i);

function updateCounter() {
  counterEl.textContent = `${currentIdx + 1} / ${pictures.length}`;
  counterEl.classList.add('pulse');
  setTimeout(() => counterEl.classList.remove('pulse'), 400);
}

function goTo(targetIdx, dir) {
  if (transitioning || targetIdx === currentIdx) return;
  if (targetIdx < 0 || targetIdx >= pictures.length) return;
  transitioning = true;

  const oldCard = cards[currentIdx];
  const newCard = cards[targetIdx];

  oldCard.classList.remove('visible');
  oldCard.classList.add(dir === 1 ? 'leaving-left' : 'leaving-right');

  newCard.classList.remove('leaving-left', 'leaving-right', 'entering-left', 'entering-right');
  newCard.classList.add(dir === 1 ? 'entering-right' : 'entering-left');

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      newCard.classList.remove('entering-left', 'entering-right');
      newCard.classList.add('visible');
    });
  });

  currentIdx = targetIdx;
  updateCounter();
  resetAutoplay();

  setTimeout(() => {
    oldCard.classList.remove('leaving-left', 'leaving-right');
    transitioning = false;
  }, 700);
}

cards[0].classList.add('visible');
updateCounter();

prevBtn.addEventListener('click', () => goTo(currentIdx - 1, -1));
nextBtn.addEventListener('click', () => goTo(currentIdx + 1, 1));

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goTo(currentIdx + 1, 1);
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') goTo(currentIdx - 1, -1);
});

let wheelAccum = 0;
let wheelTimer = null;
document.addEventListener('wheel', e => {
  e.preventDefault();
  wheelAccum += e.deltaY + e.deltaX;
  if (wheelTimer) clearTimeout(wheelTimer);
  wheelTimer = setTimeout(() => {
    if (Math.abs(wheelAccum) > 40) {
      goTo(currentIdx + (wheelAccum > 0 ? 1 : -1), wheelAccum > 0 ? 1 : -1);
    }
    wheelAccum = 0;
  }, 100);
}, { passive: false });

let touchStartX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
document.addEventListener('touchend', e => {
  const diff = touchStartX - e.changedTouches[0].clientX;
  if (Math.abs(diff) > 50) goTo(currentIdx + (diff > 0 ? 1 : -1), diff > 0 ? 1 : -1);
});

let autoplayTimer;
function resetAutoplay() {
  clearTimeout(autoplayTimer);
  autoplayTimer = setTimeout(() => goTo(currentIdx + 1, 1), 8000);
}
resetAutoplay();

// === NEBULA + EFFECTS ===
let W, H;
let stars = [], dust = [];
let mouseTX = 0.5, mouseTY = 0.5;
let mouseSmoothX = 0.5, mouseSmoothY = 0.5;
let time = 0;
let targetTiltX = 0, targetTiltY = 0;
let currentTiltX = 0, currentTiltY = 0;

function resizeCanvas() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  initStars();
  initDust();
}

function initStars() {
  stars = [];
  const count = Math.floor((W * H) / 1600);
  for (let i = 0; i < count; i++) {
    const bright = Math.random() < 0.015;
    stars.push({
      x: Math.random() * W, y: Math.random() * H,
      r: bright ? Math.random() * 1.8 + 0.8 : Math.random() * 1.1 + 0.3,
      phase: Math.random() * Math.PI * 2,
      speed: Math.random() * 0.006 + 0.002,
      parallax: Math.random() * 0.5 + 0.5,
      shade: Math.random(),
      bright,
    });
  }
}

function initDust() {
  dust = [];
  const count = Math.min(Math.floor((W * H) / 6000), 70);
  for (let i = 0; i < count; i++) {
    dust.push({
      x: Math.random() * W, y: Math.random() * H,
      r: Math.random() * 1.6 + 0.4,
      vx: (Math.random() - 0.5) * 0.2,
      vy: (Math.random() - 0.5) * 0.2 - 0.1,
      phase: Math.random() * Math.PI * 2,
      speed: Math.random() * 0.015 + 0.005,
      shade: Math.random(),
    });
  }
}



resizeCanvas();
window.addEventListener('resize', resizeCanvas);

document.addEventListener('mousemove', e => {
  mouseTX = e.clientX;
  mouseTY = e.clientY;
  cursorGlow.style.left = e.clientX + 'px';
  cursorGlow.style.top = e.clientY + 'px';
});
document.addEventListener('mouseleave', () => {
  mouseTX = W / 2;
  mouseTY = H / 2;
  cursorGlow.style.opacity = '0';
});
document.addEventListener('mouseenter', () => {
  cursorGlow.style.opacity = '1';
});




function drawNebula() {
  ctx.fillStyle = 'rgba(8, 8, 5, 0.1)';
  ctx.fillRect(0, 0, W, H);

  const mxNorm = (mouseSmoothX / W - 0.5);
  const myNorm = (mouseSmoothY / H - 0.5);
  const parallaxFactor = isTouch ? 3 : 12;

  for (const d of dust) {
    d.x += d.vx;
    d.y += d.vy;
    d.phase += d.speed;
    if (d.x < -10) d.x = W + 10;
    if (d.x > W + 10) d.x = -10;
    if (d.y < -10) d.y = H + 10;
    if (d.y > H + 10) d.y = -10;

    const alpha = 0.15 + Math.sin(d.phase) * 0.1;
    const g = 140 + Math.floor(d.shade * 60);
    const r = 180 + Math.floor(d.shade * 48);
    const b = 60 + Math.floor(d.shade * 30);
    ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${alpha * 0.7})`;
    ctx.beginPath();
    ctx.arc(d.x + mxNorm * 5, d.y + myNorm * 5, d.r, 0, Math.PI * 2);
    ctx.fill();
  }

  for (const s of stars) {
    s.phase += s.speed;
    const baseAlpha = 0.2 + Math.sin(s.phase) * 0.15 + 0.15;
    const px = s.x + mxNorm * parallaxFactor * s.parallax;
    const py = s.y + myNorm * parallaxFactor * s.parallax;

    if (s.bright) {
      const glow = ctx.createRadialGradient(px, py, 0, px, py, s.r * 4);
      const brightAlpha = baseAlpha * 1.4;
      glow.addColorStop(0, `rgba(228, 199, 107, ${brightAlpha})`);
      glow.addColorStop(0.3, `rgba(200, 168, 78, ${brightAlpha * 0.5})`);
      glow.addColorStop(1, 'rgba(0, 0, 0, 0)');
      ctx.fillStyle = glow;
      ctx.fillRect(px - s.r * 4, py - s.r * 4, s.r * 8, s.r * 8);

      ctx.fillStyle = `rgba(240, 215, 130, ${brightAlpha})`;
      ctx.beginPath();
      ctx.arc(px, py, s.r, 0, Math.PI * 2);
      ctx.fill();

      const crossAlpha = baseAlpha * 0.5;
      ctx.strokeStyle = `rgba(210, 180, 100, ${crossAlpha})`;
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(px - s.r * 3, py);
      ctx.lineTo(px + s.r * 3, py);
      ctx.moveTo(px, py - s.r * 3);
      ctx.lineTo(px, py + s.r * 3);
      ctx.stroke();
    } else {
      const g = 150 + Math.floor(s.shade * 45);
      const color = `rgba(${180 + Math.floor(s.shade * 48)}, ${g}, ${60 + Math.floor(s.shade * 30)}, ${baseAlpha})`;
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(px, py, s.r, 0, Math.PI * 2);
      ctx.fill();
    }
  }

}

function updateCardTilt() {
  if (isTouch || transitioning) return;
  const card = cards[currentIdx];
  if (!card || !card.classList.contains('visible')) return;
  const frameWrap = card.querySelector('.frame-wrap');
  if (!frameWrap) return;

  const rect = frameWrap.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const dx = (mouseSmoothX - cx) / (rect.width * 0.5);
  const dy = (mouseSmoothY - cy) / (rect.height * 0.5);
  targetTiltX = Math.max(-6, Math.min(6, dy * -6));
  targetTiltY = Math.max(-6, Math.min(6, dx * 6));
}

function animate(ts) {
  time = ts * 0.001;

  mouseSmoothX += (mouseTX - mouseSmoothX) * 0.06;
  mouseSmoothY += (mouseTY - mouseSmoothY) * 0.06;

  drawNebula();
  updateCardTilt();

  if (!isTouch) {
    currentTiltX += (targetTiltX - currentTiltX) * 0.07;
    currentTiltY += (targetTiltY - currentTiltY) * 0.07;
    const card = cards[currentIdx];
    if (card && card.classList.contains('visible')) {
      const frameWrap = card.querySelector('.frame-wrap');
      if (frameWrap) {
        const floatY = Math.sin(time * 0.9) * 5;
        frameWrap.style.transform =
          `perspective(600px) rotateX(${currentTiltX.toFixed(2)}deg) rotateY(${currentTiltY.toFixed(2)}deg) translateY(${floatY.toFixed(1)}px)`;
      }
    }
  }

  requestAnimationFrame(animate);
}

requestAnimationFrame(animate);
</script>
</body>
</html>
